[workspace]
authors = ["nttg8100 <nttg8100@gmail>"]
channels = ["conda-forge", "bioconda"]
name = "spark-on-slurm"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
sparkhpc-validate = "python examples/validate_spark.py"
sparkhpc-pi = "sparkcluster start 2 && python examples/pi_counter.py"
sparkhpc-hail = "sparkcluster start 2 && sleep 10 && python examples/simulate_gwas_by_hail.py"

[dependencies]
python = "3.11.*"
openjdk = "==17.0.18"

[pypi-dependencies]
hail = "==0.2.137"
pyspark = ">=3.5.8, <4"
sparkhpc = { path = "./sparkhpc", editable = true }